bundle:
  name: quality_de

variables:
  catalog:
    description: Unity Catalog name
    default: quality_de
  volume_input:
    description: Volume name for SharePoint input mock
    default: sharepoint_input
  volume_output:
    description: Volume name for SharePoint output mock
    default: sharepoint_output
  llm_endpoint:
    description: Foundation Model serving endpoint for column mapping
    default: databricks-gpt-oss-20b
  warehouse_id:
    description: SQL Warehouse used by dashboards / Genie / Lakebase queries
    default: 2de6a251cf2870eb   # Serverless Starter Warehouse on newaccount

resources:
  jobs:
    quality_de_pipeline:
      name: quality_de — SharePoint cleaning pipeline
      description: |
        End-to-end pipeline that cleans Quality team Excel workbooks from a
        SharePoint mock /input volume, AI-maps headers to a canonical schema,
        materializes Bronze/Silver/Gold Delta tables, and writes tidy .xlsx
        files to a SharePoint mock /output volume.
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: notebooks/00_setup.py
            base_parameters:
              catalog: ${var.catalog}
              volume_input: ${var.volume_input}
              volume_output: ${var.volume_output}
          environment_key: default

        - task_key: bronze_ingest
          depends_on:
            - task_key: setup
          notebook_task:
            notebook_path: notebooks/01_bronze_sharepoint_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              volume_input: ${var.volume_input}
          environment_key: default

        - task_key: silver_ai_cleaning
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: notebooks/02_silver_ai_cleaning.py
            base_parameters:
              catalog: ${var.catalog}
              volume_input: ${var.volume_input}
              llm_endpoint: ${var.llm_endpoint}
          environment_key: default

        - task_key: gold_curated
          depends_on:
            - task_key: silver_ai_cleaning
          notebook_task:
            notebook_path: notebooks/03_gold_curated.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default

        - task_key: export_sharepoint
          depends_on:
            - task_key: gold_curated
          notebook_task:
            notebook_path: notebooks/04_export_sharepoint.py
            base_parameters:
              catalog: ${var.catalog}
              volume_input: ${var.volume_input}
              volume_output: ${var.volume_output}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - openpyxl>=3.1.2
              - pyyaml>=6.0
              - openai>=1.40.0

      queue:
        enabled: true

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-43bf0133-31e2.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-43bf0133-31e2.cloud.databricks.com
